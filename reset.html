<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - POS Manager</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white rounded-3xl shadow-xl border border-slate-100 w-full max-w-md p-8 sm:p-12 transition-all duration-500">
        
        <!-- HEADER -->
        <div class="text-center mb-8">
            <div class="mx-auto w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mb-4">
                <i data-lucide="key-round" class="w-8 h-8 text-blue-500"></i>
            </div>
            <h1 class="text-2xl font-black text-slate-900 tracking-tight">Set New Password</h1>
            <p class="text-slate-500 text-sm mt-2">Enter your new secure password below.</p>
        </div>

        <!-- ERROR MESSAGE BOX -->
        <div id="error-box" class="hidden bg-red-50 text-red-600 text-sm p-4 rounded-lg mb-6 flex items-start">
            <i data-lucide="alert-circle" class="w-5 h-5 mr-2 flex-shrink-0"></i>
            <span id="error-message"></span>
        </div>

        <!-- REPLACED <form> WITH <div> TO PREVENT PAGE REFRESHES -->
        <div id="reset-container" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">New Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="lock" class="w-5 h-5 text-slate-400"></i>
                    </div>
                    <input type="password" id="password" required minlength="6"
                        class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                        placeholder="Min. 6 characters">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Confirm Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="shield-check" class="w-5 h-5 text-slate-400"></i>
                    </div>
                    <input type="password" id="confirm-password" required minlength="6"
                        class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                        placeholder="Confirm your password">
                </div>
            </div>

            <!-- Changed to type="button" -->
            <button type="button" id="submit-btn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-colors flex items-center justify-center">
                <span>Update Password</span>
            </button>
        </div>

        <!-- SUCCESS MESSAGE (Hidden by default) -->
        <div id="success-box" class="hidden text-center py-6">
            <div class="mx-auto w-20 h-20 bg-emerald-50 rounded-full flex items-center justify-center mb-6">
                <i data-lucide="check-circle" class="w-10 h-10 text-emerald-500"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-900 mb-2">Password Updated!</h2>
            <p class="text-slate-500">Your password has been changed successfully. You can now close this window and log into the POS application.</p>
        </div>

    </div>

    <!-- Footer -->
    <div class="mt-8 text-center">
        <p class="text-sm font-semibold text-slate-400">ROYAL POS SYSTEM</p>
    </div>

    <script>
        lucide.createIcons();

        // =========================================================================
        // ⚠️ IMPORTANT: REPLACE THESE WITH YOUR SUPABASE URL AND ANON KEY!
        // =========================================================================
        const SUPABASE_URL = 'https://gorlfdemcikfuqyucmyt.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_5OE2xfkw96CLeLz8OMRMgA_NLJ0loPJ';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const passInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirm-password');
        const submitBtn = document.getElementById('submit-btn');
        const errorBox = document.getElementById('error-box');
        const errorMessage = document.getElementById('error-message');
        const successBox = document.getElementById('success-box');
        const formContainer = document.getElementById('reset-container');

        function showError(msg) {
            errorMessage.textContent = msg;
            errorBox.classList.remove('hidden');
        }

        // Supabase takes a split second to read the URL token and establish a recovery session.
        supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'PASSWORD_RECOVERY') {
                console.log("Secure recovery session established.");
            }
        });

        // Use a click listener instead of form submit to guarantee no page refreshes
        submitBtn.addEventListener('click', async () => {
            errorBox.classList.add('hidden');

            const password = passInput.value;
            const confirmPassword = confirmInput.value;

            if (!password || password.length < 6) {
                showError("Password must be at least 6 characters.");
                return;
            }

            if (password !== confirmPassword) {
                showError("Passwords do not match.");
                return;
            }

            // UI Loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin mx-auto"></i>';
            lucide.createIcons();

            try {
                // 1. Verify that Supabase processed the URL link correctly
                const { data: { session } } = await supabase.auth.getSession();
                
                if (!session) {
                    throw new Error("No active recovery session found. Please request a new password reset link from the app.");
                }

                // 2. Tell Supabase to update the password
                const { data, error } = await supabase.auth.updateUser({
                    password: password
                });

                if (error) throw error;

                // 3. Success! Show the green confirmation.
                formContainer.style.display = 'none';
                successBox.classList.remove('hidden');

            } catch (err) {
                // Catch ANY error and display it in the red box
                showError(err.message || "Failed to update password.");
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Update Password</span>';
            }
        });
    </script>
</body>
</html>
