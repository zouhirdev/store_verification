<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - POS Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white rounded-3xl shadow-xl border border-slate-100 w-full max-w-md p-8 sm:p-12 transition-all duration-500">
        
        <div class="text-center mb-8">
            <div class="mx-auto w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mb-4">
                <i data-lucide="key-round" class="w-8 h-8 text-blue-500"></i>
            </div>
            <h1 class="text-2xl font-black text-slate-900 tracking-tight">Set New Password</h1>
            <p class="text-slate-500 text-sm mt-2">Enter your new secure password below.</p>
        </div>

        <!-- ERROR MESSAGE BOX -->
        <div id="error-box" class="hidden bg-red-50 text-red-600 text-sm p-4 rounded-lg mb-6 flex items-start">
            <i data-lucide="alert-circle" class="w-5 h-5 mr-2 flex-shrink-0"></i>
            <span id="error-message" class="font-medium break-all"></span>
        </div>

        <!-- PASSWORD INPUTS -->
        <div id="reset-container" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">New Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="lock" class="w-5 h-5 text-slate-400"></i>
                    </div>
                    <input type="password" id="password" required minlength="6"
                        class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                        placeholder="Min. 6 characters">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Confirm Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="shield-check" class="w-5 h-5 text-slate-400"></i>
                    </div>
                    <input type="password" id="confirm-password" required minlength="6"
                        class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                        placeholder="Confirm your password">
                </div>
            </div>

            <button type="button" id="submit-btn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-colors flex items-center justify-center h-12">
                <span id="btn-text">Update Password</span>
                <svg id="btn-spinner" class="hidden w-5 h-5 animate-spin text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </div>

        <!-- SUCCESS MESSAGE -->
        <div id="success-box" class="hidden text-center py-6">
            <div class="mx-auto w-20 h-20 bg-emerald-50 rounded-full flex items-center justify-center mb-6">
                <i data-lucide="check-circle" class="w-10 h-10 text-emerald-500"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-900 mb-2">Password Updated!</h2>
            <p class="text-slate-500">Your password has been changed successfully. You can now close this window and log into the POS application.</p>
        </div>
    </div>

    <script>
        // Global Crash Detector
        window.onerror = function(message) {
            document.getElementById('error-box').classList.remove('hidden');
            document.getElementById('error-message').innerText = "System Error: " + message;
            document.getElementById('submit-btn').disabled = false;
        };

        lucide.createIcons();

        // =========================================================================
        // ⚠️ YOUR CREDENTIALS HERE
        // =========================================================================
        const SUPABASE_URL = 'https://gorlfdemcikfuqyucmyt.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_5OE2xfkw96CLeLz8OMRMgA_NLJ0loPJ';
        
        const passInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirm-password');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');
        const errorBox = document.getElementById('error-box');
        const errorMessage = document.getElementById('error-message');
        const successBox = document.getElementById('success-box');
        const formContainer = document.getElementById('reset-container');

        function showError(msg) {
            errorMessage.textContent = msg;
            errorBox.classList.remove('hidden');
        }

        // ---> THE FIX: Renamed variable to supabaseClient
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Process PKCE code immediately on page load
        window.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            
            if (code) {
                try {
                    // Automatically exchange the code for a secure session in the background
                    await supabaseClient.auth.exchangeCodeForSession(code);
                    console.log("Session established securely.");
                } catch (e) {
                    showError("Invalid or expired reset link. Please request a new one.");
                }
            }
        });

        // Submit Button Logic
        submitBtn.addEventListener('click', async () => {
            try {
                errorBox.classList.add('hidden');

                const password = passInput.value;
                const confirmPassword = confirmInput.value;

                if (!password || password.length < 6) {
                    showError("Password must be at least 6 characters.");
                    return;
                }
                if (password !== confirmPassword) {
                    showError("Passwords do not match.");
                    return;
                }

                submitBtn.disabled = true;
                btnText.classList.add('hidden');
                btnSpinner.classList.remove('hidden');

                // Ensure the session was actually established
                const { data: { session }, error: sessionError } = await supabaseClient.auth.getSession();
                if (sessionError) throw sessionError;
                
                if (!session) {
                    throw new Error("Security session expired or missing. Please request a new password reset link from the app.");
                }

                // Update the password
                const { error: updateError } = await supabaseClient.auth.updateUser({
                    password: password
                });

                if (updateError) throw updateError;

                // Show Success
                formContainer.style.display = 'none';
                successBox.classList.remove('hidden');

            } catch (err) {
                showError(err.message || "An unknown error occurred.");
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
