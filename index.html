<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Verified - POS Manager</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Subtle pulse animation for the success ring */
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        .animate-pulse-ring { animation: pulse-ring 2s infinite; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Main Card -->
    <div id="main-card" class="bg-white rounded-3xl shadow-xl border border-slate-100 w-full max-w-md p-8 sm:p-12 text-center transform transition-all duration-500 opacity-0 translate-y-4">
        
        <!-- Status Icon Container -->
        <div id="icon-container" class="mx-auto w-24 h-24 rounded-full flex items-center justify-center mb-8">
            <!-- Icon will be injected by JS -->
            <i id="status-icon" data-lucide="loader-2" class="w-10 h-10 animate-spin text-blue-500"></i>
        </div>

        <!-- Text Content -->
        <h1 id="status-title" class="text-3xl font-black text-slate-900 mb-3 tracking-tight">Verifying...</h1>
        <p id="status-desc" class="text-slate-500 text-[15px] leading-relaxed mb-8">
            Please wait while we confirm your email address.
        </p>

        <!-- Divider -->
        <div class="h-px w-full bg-slate-100 mb-8"></div>

        <!-- Next Steps / Return Instruction -->
        <div class="bg-blue-50 border border-blue-100 rounded-xl p-4 flex items-start text-left">
            <i data-lucide="info" class="w-5 h-5 text-blue-600 mt-0.5 mr-3 flex-shrink-0"></i>
            <p id="help-text" class="text-sm text-blue-800 font-medium leading-relaxed">
                If you are on your phone, you can safely close this browser and return to the POS application on your computer to log in.
            </p>
        </div>
    </div>

    <!-- Footer -->
    <div class="mt-12 text-center opacity-0 animate-[fadeIn_1s_ease-in-out_1s_forwards]">
        <p class="text-sm font-semibold text-slate-400">ROYAL POS SYSTEM</p>
        <p class="text-xs text-slate-400 mt-1">Software by ZouhirDev &copy; 2026</p>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        document.addEventListener("DOMContentLoaded", () => {
            // Fade in the card gracefully
            setTimeout(() => {
                const card = document.getElementById('main-card');
                card.classList.remove('opacity-0', 'translate-y-4');
            }, 100);

            // Supabase sends error data in the URL hash (e.g. #error=access_denied&error_description=Link+expired)
            // or query parameters. Let's check both.
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            const queryParams = new URLSearchParams(window.location.search);
            
            const error = hashParams.get('error') || queryParams.get('error');
            const errorDesc = hashParams.get('error_description') || queryParams.get('error_description');

            setTimeout(() => {
                const iconContainer = document.getElementById('icon-container');
                const statusIcon = document.getElementById('status-icon');
                const title = document.getElementById('status-title');
                const desc = document.getElementById('status-desc');
                const helpText = document.getElementById('help-text');

                if (error) {
                    // ERROR STATE
                    iconContainer.className = "mx-auto w-24 h-24 rounded-full flex items-center justify-center mb-8 bg-red-50";
                    iconContainer.innerHTML = '<i data-lucide="x" class="w-12 h-12 text-red-500"></i>';
                    title.textContent = "Link Expired or Invalid";
                    desc.textContent = errorDesc ? errorDesc.replace(/\+/g, ' ') : "We couldn't verify your email. The link might have expired.";
                    title.className = "text-3xl font-black text-red-600 mb-3 tracking-tight";
                    helpText.textContent = "Please go back to the POS application and request a new password reset or verification link.";
                } else {
                    // SUCCESS STATE
                    iconContainer.className = "mx-auto w-24 h-24 rounded-full flex items-center justify-center mb-8 bg-emerald-50 animate-pulse-ring";
                    iconContainer.innerHTML = '<i data-lucide="check" class="w-12 h-12 text-emerald-500"></i>';
                    title.textContent = "Email Verified!";
                    desc.textContent = "Your store account has been successfully verified and is now fully active.";
                }
                
                // Re-init icons because we injected new HTML
                lucide.createIcons();
            }, 800); // Small fake delay so the user sees the "Verifying..." spinner
        });
    </script>
</body>
</html>
